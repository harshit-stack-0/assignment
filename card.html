<!DOCTYPE html>
<html>
<head>
    <title>Simple Profile Card</title>

    <style>
        body {
            background-color: lightgray;
            text-align: center;
            font-family: Arial;
        }

        .card {
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 15px;
            border: 1px solid black;
        }

        img {
            width: 100px;
            height: 100px;
        }

        button:hover {
            background-color: gray;
            color: white;
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg?auto=compress&cs=tinysrgb&w=160">

        <h2>John</h2>
        <span>Beginner Developer</span>

        <ul>
            <li>HTML</li>
            <li>CSS</li>
        </ul>

        <table border="1" width="100%">
            <tr>
                <td>Age</td>
                <td>20</td>
            </tr>
        </table>

        <br>

        <a href="#">My Profile</a>

        <form>
            <br>
            <input type="text" placeholder="Name"><br><br>
            <textarea placeholder="Message"></textarea><br><br>
            <button>Send</button>
        </form>

    </div>

</body>
</html>
